<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boost Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:420px;
    padding:25px;
}

.logo{
    text-align:center;
    margin-bottom:45px;
}

.logo img{
    width:170px;
}

.input-box{
    background:#f7f7f7;
    border-radius:35px;
    padding:18px;
    display:flex;
    align-items:center;
    margin-bottom:20px;
    border-bottom:1px solid #ddd;
}

.input-box span{
    font-size:22px;
    margin-right:12px;
    color:#1e88e5;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-size:18px;
    color:#444;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    color:#1e88e5;
    font-size:15px;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#1e88e5;
    color:white;
    font-size:30px;
    cursor:pointer;
}

.agree{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#666;
}

.agree a{
    color:#1e88e5;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.jpg" alt="Logo">
    </div>

    <div class="input-box">
        <span>📱</span>
        <input type="text" placeholder="Enter mobile number">
    </div>

    <div class="input-box">
        <span>🔒</span>
        <input type="password" placeholder="Enter access code">
    </div>

    <div class="row">
        <label>
            <input type="checkbox">
            Save Details
        </label>

        <span>Forgot Code</span>
    </div>

    <button class="btn" onclick="boost()">Boost Sell</button>

    <div class="agree">
        ✔ Agree to
        <a href="#">Terms & Privacy</a>
    </div>

</div>

<script>
function boost(){
    alert("Sell Boosted Successfully");
}
</script>

</body>
</html>
